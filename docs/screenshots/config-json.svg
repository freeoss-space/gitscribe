<svg xmlns="http://www.w3.org/2000/svg" width="750" height="344" viewBox="0 0 750 344">
  <defs>
    <style>
      text { font-family: Cascadia Code, Fira Code, JetBrains Mono, Menlo, Consolas, monospace; font-size: 14px; }
    </style>
  </defs>
  <!-- Window -->
  <rect width="750" height="344" rx="8" fill="#1e1e2e"/>
  <!-- Title bar -->
  <rect width="750" height="40" rx="8" fill="#313244"/>
  <rect y="32" width="750" height="8" fill="#313244"/>
  <!-- Traffic lights -->
  <circle cx="18" cy="20" r="6" fill="#f38ba8"/>
  <circle cx="36" cy="20" r="6" fill="#f9e2af"/>
  <circle cx="54" cy="20" r="6" fill="#a6e3a1"/>
  <!-- Title -->
  <text x="375" y="26" text-anchor="middle" fill="#bac2de">gitscribe — .gitscribe/config.json</text>
  <text x="20" y="74" fill="#a6e3a1">$ cat .gitscribe/config.json</text>
  <text x="20" y="96" fill="#cdd6f4"> </text>
  <text x="20" y="118" fill="#cdd6f4">{</text>
  <text x="20" y="140" fill="#89b4fa">  "llm":    { "command": "claude", "timeout_seconds": 30 },</text>
  <text x="20" y="162" fill="#cba6f7">  "format": { "type": "conventional",</text>
  <text x="20" y="184" fill="#cba6f7">              "types": ["feat","fix","chore","docs"] },</text>
  <text x="20" y="206" fill="#f9e2af">  "style":  { "tone": "professional", "emoji": false },</text>
  <text x="20" y="228" fill="#a6e3a1">  "body":   { "mode": "small", "min_items": 3,</text>
  <text x="20" y="250" fill="#a6e3a1">              "max_items": 5, "bullet_style": "dash" }</text>
  <text x="20" y="272" fill="#cdd6f4">}</text>
  <text x="20" y="294" fill="#cdd6f4"> </text>
  <text x="20" y="316" fill="#a6e3a1">$ _</text>
</svg>
