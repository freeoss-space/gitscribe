<svg xmlns="http://www.w3.org/2000/svg" width="700" height="344" viewBox="0 0 700 344">
  <defs>
    <style>
      text { font-family: Cascadia Code, Fira Code, JetBrains Mono, Menlo, Consolas, monospace; font-size: 14px; }
    </style>
  </defs>
  <!-- Window -->
  <rect width="700" height="344" rx="8" fill="#1e1e2e"/>
  <!-- Title bar -->
  <rect width="700" height="40" rx="8" fill="#313244"/>
  <rect y="32" width="700" height="8" fill="#313244"/>
  <!-- Traffic lights -->
  <circle cx="18" cy="20" r="6" fill="#f38ba8"/>
  <circle cx="36" cy="20" r="6" fill="#f9e2af"/>
  <circle cx="54" cy="20" r="6" fill="#a6e3a1"/>
  <!-- Title -->
  <text x="350" y="26" text-anchor="middle" fill="#bac2de">gitscribe — commit (interactive TUI mode)</text>
  <text x="20" y="74" fill="#a6e3a1">$ gitscribe commit</text>
  <text x="20" y="96" fill="#cdd6f4"> </text>
  <text x="20" y="118" fill="#cba6f7">Editing commit message</text>
  <text x="20" y="140" fill="#f9e2af">Title: feat: add user authentication</text>
  <text x="20" y="162" fill="#cdd6f4"> </text>
  <text x="20" y="184" fill="#cdd6f4">- Implement JWT-based auth middleware</text>
  <text x="20" y="206" fill="#cdd6f4">- Add login/logout endpoints</text>
  <text x="20" y="228" fill="#cdd6f4">- Store hashed passwords with bcrypt</text>
  <text x="20" y="250" fill="#cdd6f4"> </text>
  <text x="20" y="272" fill="#6c7086">  [Esc] Quit   [Enter] Accept</text>
  <text x="20" y="294" fill="#cdd6f4"> </text>
  <text x="20" y="316" fill="#a6e3a1">$ _</text>
</svg>
