<svg xmlns="http://www.w3.org/2000/svg" width="780" height="344" viewBox="0 0 780 344">
  <defs>
    <style>
      text { font-family: Cascadia Code, Fira Code, JetBrains Mono, Menlo, Consolas, monospace; font-size: 14px; }
    </style>
  </defs>
  <!-- Window -->
  <rect width="780" height="344" rx="8" fill="#1e1e2e"/>
  <!-- Title bar -->
  <rect width="780" height="40" rx="8" fill="#313244"/>
  <rect y="32" width="780" height="8" fill="#313244"/>
  <!-- Traffic lights -->
  <circle cx="18" cy="20" r="6" fill="#f38ba8"/>
  <circle cx="36" cy="20" r="6" fill="#f9e2af"/>
  <circle cx="54" cy="20" r="6" fill="#a6e3a1"/>
  <!-- Title -->
  <text x="390" y="26" text-anchor="middle" fill="#bac2de">gitscribe — build &amp; run</text>
  <text x="20" y="74" fill="#a6e3a1">$ go build -o gitscribe ./cmd/gitscribe</text>
  <text x="20" y="96" fill="#a6e3a1">$ ls -lh gitscribe</text>
  <text x="20" y="118" fill="#cdd6f4">-rwxr-xr-x 1 user user 2.1M Apr 30 05:13 gitscribe</text>
  <text x="20" y="140" fill="#cdd6f4"> </text>
  <text x="20" y="162" fill="#a6e3a1">$ ./gitscribe commit --no-interface</text>
  <text x="20" y="184" fill="#f9e2af">feat: add support for headless shell testing</text>
  <text x="20" y="206" fill="#cdd6f4"> </text>
  <text x="20" y="228" fill="#cdd6f4">- Capture CLI output using script(1) for headless sessions</text>
  <text x="20" y="250" fill="#cdd6f4">- Generate SVG terminal screenshots for documentation</text>
  <text x="20" y="272" fill="#cdd6f4">- Add comprehensive README with open source attribution</text>
  <text x="20" y="294" fill="#cdd6f4"> </text>
  <text x="20" y="316" fill="#a6e3a1">$ _</text>
</svg>
